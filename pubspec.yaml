name: flutter_task_v1_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 < 4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  image_picker: ^1.2.1 #ใช้เปิดกล้อง เปิดแกลลอรี่
  intl: ^0.20.2 #ใช้จัด format ของวันที่ เวลา ตัวเลข
  supabase_flutter: ^2.12.0 #ใช้เชื่อมต่อกับ supabase

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  icons_launcher: ^3.0.3

icons_launcher:
  image_path: "assets/icon/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
